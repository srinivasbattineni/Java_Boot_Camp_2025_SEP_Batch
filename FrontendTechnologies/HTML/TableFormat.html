<!Doctype html>
<html>
<head>
<title> Table Format </title>
<style>
    table {
      border-collapse: collapse;
      width: 80%;
      margin: 20px auto;
    }
    th, td {
      border: 1px solid #000;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color:grey;
    }
  </style></head>

</tr>
